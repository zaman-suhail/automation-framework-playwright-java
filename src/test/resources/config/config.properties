# Browser
browser=chrome

# Base URL
url=https://www.saucedemo.com

# Playwright Timeouts (milliseconds)
timeout=30000

# Headless Mode
headless=false

# Slow Motion (for debugging)
slowmo=0

# Screenshot on failure
screenshot.on.failure=true

# Reports folder
reports.folder=reports/

# Logs folder
logs.folder=logs/
