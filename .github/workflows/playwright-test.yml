name: Playwright Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # FIX 1: --with-deps installs required OS libraries automatically
      - name: Install Playwright Browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Create Output Folders
        run: |
          mkdir -p target/extent-reports
          mkdir -p logs

      - name: Run Tests
        run: mvn clean test -Dheadless=true

      # FIX 2: correct paths where Maven actually writes reports
      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Report-${{ github.run_number }}
          path: |
            target/surefire-reports/
            target/extent-reports/
            logs/
          retention-days: 30

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Framework: Playwright + TestNG + Maven" >> $GITHUB_STEP_SUMMARY